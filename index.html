<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Glow Store</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#ffe6f2;
}
header{
    background:#ff4da6;
    color:white;
    text-align:center;
    padding:20px;
}
nav{
    background:#ff80bf;
    text-align:center;
    padding:10px;
}
nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
}
.container{
    width:90%;
    margin:auto;
    padding:20px;
}
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}
.card{
    background:white;
    width:250px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    padding:15px;
    text-align:center;
}
